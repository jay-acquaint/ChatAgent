version: "3.9"

services:
  app:
    build: .
    container_name: agent_app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - ollama
    environment:
      - REDIS_HOST=redis
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - .:/app

  redis:
    image: redis:7
    container_name: redis_db
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ollama:
    image: ollama/ollama
    container_name: ollama_server
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
  redis_data:
  